<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ngrok Teste 2 - Escadinha</title>
</head>
<body>
    <h1>Entrar na Escadinha</h1>
    <input type="text" id="nome" placeholder="Digite seu nome">
    <button onclick="enviarNome()">Adicionar na Lista</button>

    <script>
        const NGROK_URL = "https://rudy-unabrogated-rolf.ngrok-free.dev";

        function enviarNome() {
            const nome = document.getElementById('nome').value;
            if(!nome) return alert("Escreve um nome aí!");

            fetch(`${NGROK_URL}/add?nome=${nome}`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            })
            .then(() => {
                alert("Nome enviado! Olha o CMD do dono do link.");
                document.getElementById('nome').value = "";
            });
        }
    </script>
</body>
</html>
