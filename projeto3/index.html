<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ngrok Teste 3 - Mural</title>
    <style>
        #mural { border: 1px solid #ccc; padding: 10px; height: 200px; overflow-y: scroll; margin-top: 10px; }
        .msg-item { border-bottom: 1px dashed #eee; padding: 5px; }
    </style>
</head>
<body>
    <h1>Mural em Tempo Real</h1>
    <input type="text" id="user" placeholder="Seu Nome"> <br><br>
    <textarea id="msg" placeholder="Sua mensagem"></textarea> <br>
    <button onclick="postar()">Enviar Mensagem</button>

    <h3>Mensagens de todos:</h3>
    <div id="mural">Carregando mensagens...</div>

    <script>
        const NGROK_URL = "https://rudy-unabrogated-rolf.ngrok-free.dev";

        async function postar() {
            const user = document.getElementById('user').value;
            const msg = document.getElementById('msg').value;
            
            await fetch(`${NGROK_URL}/send?user=${encodeURIComponent(user)}&msg=${encodeURIComponent(msg)}`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            
            document.getElementById('msg').value = "";
            atualizarMural();
        }

        async function atualizarMural() {
            try {
                const res = await fetch(`${NGROK_URL}/mensagens`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                const dados = await res.json();
                
                const mural = document.getElementById('mural');
                mural.innerHTML = dados.map(m => `
                    <div class="msg-item">
                        <strong>${m.user}:</strong> ${m.msg}
                    </div>
                `).join('');
            } catch (err) {
                console.log("Servidor offline ou link errado.");
            }
        }
        setInterval(atualizarMural, 3000);
        atualizarMural();
    </script>
</body>
</html>
