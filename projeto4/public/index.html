<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Ngrok</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 90vh;
        }
        .container {
            background: white; padding: 30px; border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            max-width: 500px; width: 100%;
        }
        input[type="text"] {
            width: 90%; padding: 15px; font-size: 18px; margin-bottom: 20px;
            border: 1px solid #ccc; border-radius: 5px; text-align: center;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background-color: #46178f; color: white; border: none; border-radius: 5px;
            width: 100%; margin-bottom: 10px; transition: background 0.3s;
        }
        button:hover { background-color: #320f68; }
        .opcao-btn { background-color: #1368ce; }
        .opcao-btn:hover { background-color: #0d4a96; }
        #timer {
            font-size: 24px; font-weight: bold; color: #e21b3c;
            margin-bottom: 20px;
        }
        #tela-quiz, #tela-fim { display: none; }
    </style>
</head>
<body>

    <!-- TELA 1: Nome do Aluno -->
    <div class="container" id="tela-nome">
        <h1>Quiz: Ngrok</h1>
        <p>Digite seu nome para começar:</p>
        <input type="text" id="nome-aluno" placeholder="Seu nome completo">
        <button onclick="iniciarQuiz()">Começar!</button>
    </div>

    <!-- TELA 2: Perguntas e Timer -->
    <div class="container" id="tela-quiz">
        <div id="timer">Tempo: 40s</div>
        <h2 id="texto-pergunta">Pergunta...</h2>
        <div id="opcoes-container"></div>
    </div>

    <!-- TELA 3: Fim -->
    <div class="container" id="tela-fim">
        <h1>Fim do Quiz!</h1>
        <p>Sua pontuação foi enviada para o professor.</p>
    </div>

    <script>
        const perguntas = [
            {
                pergunta: "O que é o Ngrok?",
                opcoes: ["Banco de dados", "Ferramenta de tunelamento reverso", "Sistema operacional", "Antivírus"],
                respostaCorreta: "Ferramenta de tunelamento reverso"
            },
            {
                pergunta: "Qual é a principal utilidade do Ngrok?",
                opcoes: ["Expor servidor local para a internet", "Compactar arquivos", "Hospedar sites permanentemente", "Gerar senhas"],
                respostaCorreta: "Expor servidor local para a internet"
            },
            {
                pergunta: "Qual comando inicia um túnel HTTP na porta 8080?",
                opcoes: ["ngrok start 8080", "ngrok run http 8080", "ngrok http 8080", "ngrok port 8080"],
                respostaCorreta: "ngrok http 8080"
            },
            {
                pergunta: "O Ngrok gera conexões seguras (HTTPS)?",
                opcoes: ["Não, apenas HTTP", "Sim, gera HTTP e HTTPS", "Apenas se você comprar um certificado", "Nenhuma das alternativas"],
                respostaCorreta: "Sim, gera HTTP e HTTPS"
            }
        ];

        let nome = "";
        let perguntaAtual = 0;
        let score = 0;
        let tempoRestante = 40;
        let timerInterval;

        function iniciarQuiz() {
            nome = document.getElementById('nome-aluno').value.trim();
            if (!nome) {
                alert("Por favor, digite seu nome!");
                return;
            }

            document.getElementById('tela-nome').style.display = 'none';
            document.getElementById('tela-quiz').style.display = 'block';
            carregarPergunta();
        }

        function carregarPergunta() {
            if (perguntaAtual >= perguntas.length) {
                finalizarQuiz();
                return;
            }

            const p = perguntas[perguntaAtual];
            document.getElementById('texto-pergunta').innerText = p.pergunta;
            
            const divOpcoes = document.getElementById('opcoes-container');
            divOpcoes.innerHTML = "";

            p.opcoes.forEach(opcao => {
                const btn = document.createElement('button');
                btn.className = "opcao-btn";
                btn.innerText = opcao;
                btn.onclick = () => verificarResposta(opcao);
                divOpcoes.appendChild(btn);
            });

            // Reinicia o relógio
            tempoRestante = 40;
            document.getElementById('timer').innerText = `Tempo: ${tempoRestante}s`;
            clearInterval(timerInterval);
            timerInterval = setInterval(atualizarTempo, 1000);
        }

        function atualizarTempo() {
            tempoRestante--;
            document.getElementById('timer').innerText = `Tempo: ${tempoRestante}s`;

            if (tempoRestante <= 0) {
                clearInterval(timerInterval);
                // Tempo acabou, conta como erro e passa pra próxima
                perguntaAtual++;
                carregarPergunta();
            }
        }

        function verificarResposta(respostaEscolhida) {
            clearInterval(timerInterval);
            const correta = perguntas[perguntaAtual].respostaCorreta;
            
            if (respostaEscolhida === correta) {
                score++;
            }

            perguntaAtual++;
            carregarPergunta();
        }

        function finalizarQuiz() {
            document.getElementById('tela-quiz').style.display = 'none';
            document.getElementById('tela-fim').style.display = 'block';

            // Envia o resultado para o seu terminal (backend)
            fetch('/enviar-score', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    nome: nome,
                    score: score,
                    total: perguntas.length
                })
            });
        }
    </script>
</body>
</html>
